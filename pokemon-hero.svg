<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <defs>
    <style>
      .txt { font-family: 'Courier New', monospace; }
      .text-main { fill: #F8FAFC; }
      .text-sec { fill: #8B949E; }
      .card { fill: #161B22; stroke: #30363D; stroke-width: 1.5; }
    </style>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <radialGradient id="yellowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5794A"/>
      <stop offset="100%" stop-color="#8F5D2D"/>
    </linearGradient>

    <linearGradient id="jacketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2029"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <linearGradient id="creatureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEA70"/>
      <stop offset="100%" stop-color="#FACC15"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlowSmall" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <circle cx="1180" cy="380" r="420" fill="url(#yellowGlow)"/>
  <circle cx="1400" cy="150" r="260" fill="url(#blueGlow)"/>
  <circle cx="250" cy="750" r="300" fill="url(#purpleGlow)"/>

  <!-- hexagon grid, subtle -->
  <g id="hex-grid" opacity="0.10" stroke="#58A6FF" stroke-width="1.5" fill="none">
    <polygon points="1000,60 1030,45 1060,60 1060,90 1030,105 1000,90"/>
    <polygon points="1060,90 1090,75 1120,90 1120,120 1090,135 1060,120"/>
    <polygon points="1000,90 1030,105 1030,135 1000,150 970,135 970,105"/>
    <polygon points="1300,700 1330,685 1360,700 1360,730 1330,745 1300,730"/>
    <polygon points="1360,730 1390,715 1420,730 1420,760 1390,775 1360,760"/>
  </g>

  <!-- circuit lines -->
  <g id="circuit-lines" opacity="0.15" stroke="#FFD93D" stroke-width="2" fill="none">
    <path d="M1600 200 H1480 V260 H1400"/>
    <path d="M1600 620 H1520 V560 H1440"/>
    <circle cx="1480" cy="200" r="4" fill="#FFD93D"/>
    <circle cx="1400" cy="260" r="4" fill="#FFD93D"/>
    <circle cx="1440" cy="560" r="4" fill="#FFD93D"/>
  </g>

  <!-- binary rain -->
  <g class="txt" font-size="15" fill="#FFD93D" opacity="0.18">
    <text x="60" y="90">0110</text>
    <text x="120" y="160">1011</text>
    <text x="1540" y="120">0101</text>
    <text x="1500" y="820">1100</text>
    <text x="70" y="640">1001</text>
    <text x="90" y="820">0011</text>
  </g>

  <!-- ===================== LEFT: EMPTY SPACE FOR README TEXT ===================== -->
  <g id="readme-text-zone" transform="translate(90,340)">
    <text class="txt" font-size="46" fill="#F8FAFC" font-weight="bold">Yash Sabale</text>
    <text class="txt" font-size="22" fill="#FFD93D" y="50">CS Student · AI Engineer · Builder</text>
    <rect x="0" y="90" width="260" height="4" fill="#FFD93D" opacity="0.7"/>
  </g>

  <!-- ===================== FLOATING TERMINAL (top-left) ===================== -->
  <g id="terminal" transform="translate(90,90)" filter="url(#softGlowSmall)">
    <rect class="card" width="300" height="150" rx="10"/>
    <rect fill="#21262D" width="300" height="28" rx="10"/>
    <circle cx="20" cy="14" r="5" fill="#F85149"/>
    <circle cx="38" cy="14" r="5" fill="#E3B341"/>
    <circle cx="56" cy="14" r="5" fill="#238636"/>
    <text x="16" y="56" class="txt text-sec" font-size="13">$ summon --creature pikaspark</text>
    <text x="16" y="80" class="txt" fill="#FFD93D" font-size="13">⚡ companion linked</text>
    <text x="16" y="104" class="txt text-sec" font-size="13">$ git push origin main</text>
    <text x="16" y="128" class="txt" fill="#58A6FF" font-size="13">Hello, World!<tspan fill="#FFD93D">▌
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </tspan></text>
  </g>

  <!-- energy rings behind character -->
  <g id="energy-rings" transform="translate(1150,470)" fill="none" stroke="#FFD93D" opacity="0.5">
    <circle r="260" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle r="310" stroke-width="1.5" stroke-dasharray="6 10" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ===================== CHARACTER ===================== -->
  <!-- NOTE: generic stylized figure, no photo has been uploaded yet for a true likeness -->
  <g id="character" transform="translate(1150,560)">
    <ellipse cx="0" cy="270" rx="180" ry="34" fill="#000" opacity="0.3"/>

    <!-- mechanical backpack -->
    <rect x="60" y="-40" width="46" height="140" rx="14" fill="url(#jacketGrad)" stroke="#FFD93D" stroke-width="1.5"/>
    <circle cx="83" cy="10" r="8" fill="#FFD93D" filter="url(#softGlowSmall)"/>

    <!-- legs / sneakers glow -->
    <rect x="-70" y="200" width="46" height="80" rx="10" fill="url(#jacketGrad)"/>
    <rect x="30" y="200" width="46" height="80" rx="10" fill="url(#jacketGrad)"/>
    <rect x="-74" y="270" width="54" height="20" rx="8" fill="#111827" stroke="#FFD93D" stroke-width="2" filter="url(#softGlowSmall)"/>
    <rect x="26" y="270" width="54" height="20" rx="8" fill="#111827" stroke="#FFD93D" stroke-width="2" filter="url(#softGlowSmall)"/>

    <!-- oversized hoodie torso with glowing trims -->
    <path d="M-110 190 C -125 60 -90 -20 0 -30 C 90 -20 125 60 110 190 Z" fill="url(#jacketGrad)" stroke="#30363D" stroke-width="2"/>
    <path d="M-108 40 C -100 100 -100 150 -95 188" fill="none" stroke="#FFD93D" stroke-width="3" opacity="0.8"/>
    <path d="M108 40 C 100 100 100 150 95 188" fill="none" stroke="#FFD93D" stroke-width="3" opacity="0.8"/>
    <path d="M-40 -20 C -20 -5 20 -5 40 -20" fill="none" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>

    <!-- utility jacket panel lines -->
    <rect x="-18" y="60" width="36" height="70" rx="6" fill="#0D1117" stroke="#58A6FF" stroke-width="1.5" opacity="0.7"/>

    <!-- one hand in pocket -->
    <path d="M-105 130 C -130 150 -125 185 -95 190 L -80 165 C -95 160 -100 145 -95 135 Z" fill="url(#jacketGrad)"/>

    <!-- other hand projecting hologram -->
    <g transform="translate(120,120)">
      <path d="M0 0 C 25 10 35 40 20 65 L 0 55 C 5 35 -5 15 0 0 Z" fill="url(#skinGrad)"/>
      <circle cx="35" cy="55" r="6" fill="url(#skinGrad)"/>
      <!-- hologram beam -->
      <path d="M40 55 L110 20 L110 100 Z" fill="#58A6FF" opacity="0.15"/>
    </g>

    <!-- neck -->
    <rect x="-18" y="-56" width="36" height="36" rx="12" fill="url(#skinGrad)"/>

    <!-- head -->
    <g id="head">
      <ellipse cx="0" cy="-110" rx="66" ry="74" fill="url(#skinGrad)"/>
      <!-- visor resting above forehead -->
      <path d="M-58 -160 Q 0 -180 58 -160 L 50 -145 Q 0 -160 -50 -145 Z" fill="#111827" stroke="#FFD93D" stroke-width="2" filter="url(#softGlowSmall)"/>

      <!-- hair with electric wind motion -->
      <path d="M-64 -125 C -70 -175 -35 -198 0 -198 C 38 -198 70 -175 64 -122 C 50 -150 30 -158 12 -160 C 22 -148 12 -136 -8 -140 C -28 -144 -32 -156 -22 -164 C -42 -158 -58 -145 -64 -125 Z" fill="#0D1117"/>
      <path d="M60 -150 C 75 -155 85 -145 82 -132" stroke="#FFD93D" stroke-width="2" fill="none" opacity="0.7">
        <animate attributeName="d" values="M60 -150 C 75 -155 85 -145 82 -132; M60 -150 C 78 -160 90 -142 82 -128; M60 -150 C 75 -155 85 -145 82 -132" dur="2s" repeatCount="indefinite"/>
      </path>

      <!-- eyebrows -->
      <path d="M-38 -122 Q -20 -132 -6 -122" fill="none" stroke="#0D1117" stroke-width="6" stroke-linecap="round"/>
      <path d="M38 -122 Q 20 -132 6 -122" fill="none" stroke="#0D1117" stroke-width="6" stroke-linecap="round"/>

      <!-- eyes, confident -->
      <ellipse cx="-22" cy="-106" rx="9" ry="6" fill="#F8FAFC"/>
      <ellipse cx="22" cy="-106" rx="9" ry="6" fill="#F8FAFC"/>
      <circle cx="-20" cy="-106" r="4" fill="#3A2416"/>
      <circle cx="20" cy="-106" r="4" fill="#3A2416"/>

      <!-- beard + mustache -->
      <path d="M-46 -70 C -42 -35 -18 -12 0 -12 C 18 -12 42 -35 46 -70 C 37 -48 18 -34 0 -34 C -18 -34 -37 -48 -46 -70 Z" fill="#0D1117"/>
      <path d="M-24 -78 C -10 -70 10 -70 24 -78 C 18 -68 -18 -68 -24 -78 Z" fill="#0D1117"/>

      <!-- confident smile -->
      <path d="M-14 -50 Q 0 -44 14 -50" fill="none" stroke="#3A2416" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ===================== ORIGINAL ELECTRIC CREATURES ===================== -->

  <!-- creature 1: on shoulder -->
  <g id="creature-shoulder" transform="translate(1075,430)" filter="url(#softGlowSmall)">
    <polygon points="0,-30 22,-14 14,14 -14,14 -22,-14" fill="url(#creatureGrad)"/>
    <circle cx="-7" cy="-4" r="4" fill="#111827"/>
    <circle cx="7" cy="-4" r="4" fill="#111827"/>
    <path d="M0 -30 L0 -46" stroke="#FACC15" stroke-width="3" stroke-linecap="round"/>
    <path d="M-14 14 C -20 30 -10 40 0 34" stroke="#FACC15" stroke-width="3" fill="none" opacity="0.8"/>
    <animateTransform attributeName="transform" type="translate" values="1075,430; 1075,418; 1075,430" dur="2.4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- creature 2: emerging from holographic code -->
  <g id="creature-code" transform="translate(1330,300)">
    <rect x="-40" y="-20" width="80" height="40" rx="6" fill="#0D1117" opacity="0.5" stroke="#58A6FF" stroke-width="1.5"/>
    <text x="-34" y="-4" class="txt" font-size="9" fill="#58A6FF">def spark():</text>
    <text x="-34" y="10" class="txt" font-size="9" fill="#58A6FF">  return ⚡</text>
    <g transform="translate(0,-46)" filter="url(#softGlowSmall)">
      <ellipse rx="20" ry="26" fill="url(#creatureGrad)"/>
      <circle cx="-6" cy="-4" r="3.5" fill="#111827"/>
      <circle cx="6" cy="-4" r="3.5" fill="#111827"/>
      <path d="M0 -26 L-8 -40 M0 -26 L8 -40" stroke="#FACC15" stroke-width="2.5"/>
      <animateTransform attributeName="transform" type="translate" values="0,-46; 0,-58; 0,-46" dur="3s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>

  <!-- creature 3: inside a pokeball made of code -->
  <g id="creature-orb" transform="translate(1420,540)">
    <circle r="46" fill="none" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <line x1="-46" y1="0" x2="46" y2="0" stroke="#FFD93D" stroke-width="2" opacity="0.6"/>
    <circle r="10" fill="#111827" stroke="#FFD93D" stroke-width="2"/>
    <text x="-30" y="-52" class="txt" font-size="8" fill="#8B5CF6" opacity="0.8">01001</text>
    <text x="10" y="66" class="txt" font-size="8" fill="#8B5CF6" opacity="0.8">10110</text>
    <g filter="url(#softGlowSmall)">
      <polygon points="0,-22 16,-8 10,14 -10,14 -16,-8" fill="url(#creatureGrad)" opacity="0.9"/>
      <circle cx="-5" cy="-2" r="3" fill="#111827"/>
      <circle cx="5" cy="-2" r="3" fill="#111827"/>
    </g>
    <animateTransform attributeName="transform" type="rotate" from="0 1420 540" to="360 1420 540" dur="18s" repeatCount="indefinite"/>
  </g>

  <!-- creature 4: orbiting, fox-eared companion -->
  <g id="creature-orbit1" transform="translate(1000,250)" filter="url(#softGlowSmall)">
    <ellipse rx="24" ry="30" fill="url(#creatureGrad)"/>
    <polygon points="-14,-24 -22,-46 -4,-30" fill="#FACC15"/>
    <polygon points="14,-24 22,-46 4,-30" fill="#FACC15"/>
    <circle cx="-7" cy="-2" r="4" fill="#111827"/>
    <circle cx="7" cy="-2" r="4" fill="#111827"/>
    <path d="M-20 20 Q -40 30 -34 50" stroke="#FACC15" stroke-width="3" fill="none"/>
    <animateTransform attributeName="transform" type="translate" values="1000,250; 1030,235; 1000,250" dur="4s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- creature 5: small floating spark -->
  <g id="creature-orbit2" transform="translate(1310,470)" filter="url(#softGlowSmall)">
    <path d="M0 -18 L8 -2 L2 -2 L10 18 L-8 -2 L-2 -2 Z" fill="url(#creatureGrad)"/>
    <animateTransform attributeName="transform" type="translate" values="1310,470; 1300,450; 1310,470" dur="2.6s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- electric arcs between creatures -->
  <g stroke="#FFD93D" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M1000,250 Q1050,260 1075,410">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M1330,300 Q1340,400 1310,460">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===================== FLOATING TECH ICONS ===================== -->
  <g id="tech-icons" opacity="0.9">
    <g transform="translate(480,180)">
      <ellipse rx="30" ry="11" fill="none" stroke="#58A6FF" stroke-width="2.5"/>
      <ellipse rx="30" ry="11" fill="none" stroke="#58A6FF" stroke-width="2.5" transform="rotate(60)"/>
      <ellipse rx="30" ry="11" fill="none" stroke="#58A6FF" stroke-width="2.5" transform="rotate(120)"/>
      <circle r="5" fill="#58A6FF"/>
    </g>
    <g transform="translate(560,700)">
      <text class="txt" font-size="24" font-weight="bold" fill="#8B5CF6">TF</text>
    </g>
    <g transform="translate(300,220)">
      <rect x="-26" y="-14" width="52" height="28" rx="4" fill="#161B22" stroke="#30363D" stroke-width="2"/>
      <text x="-18" y="5" class="txt" font-size="14" fill="#238636">&gt;_</text>
    </g>
    <g transform="translate(640,140)">
      <path d="M-24 8 a14 14 0 1 1 3 -28 a19 19 0 0 1 36 6 a13 13 0 0 1 -5 22 z" fill="none" stroke="#E3B341" stroke-width="2.5"/>
    </g>
  </g>

  <!-- neural network cluster -->
  <g transform="translate(420,600)" stroke="#8B5CF6" stroke-width="2" opacity="0.8">
    <circle cx="0" cy="0" r="5" fill="#8B5CF6"/>
    <circle cx="40" cy="-28" r="5" fill="#58A6FF"/>
    <circle cx="40" cy="28" r="5" fill="#58A6FF"/>
    <circle cx="80" cy="0" r="5" fill="#FFD93D"/>
    <line x1="0" y1="0" x2="40" y2="-28"/>
    <line x1="0" y1="0" x2="40" y2="28"/>
    <line x1="40" y1="-28" x2="80" y2="0"/>
    <line x1="40" y1="28" x2="80" y2="0"/>
  </g>
</svg>
