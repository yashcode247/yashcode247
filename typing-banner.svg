<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 90" width="100%" height="90">
  <defs>
    <style>
      .line { font-family: 'Fira Code','Courier New',monospace; font-size: 26px; fill: #58A6FF; }
      .cursor { fill: #FFD93D; }
    </style>
  </defs>
  <rect width="700" height="90" fill="none"/>

  <text x="20" y="55" class="line" opacity="0">
    CS Student @ University at Buffalo
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.22;0.25" dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="55" class="line" opacity="0">
    AI Researcher
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.30;0.47;0.50" dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="55" class="line" opacity="0">
    Building CodeOpoly
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.50;0.55;0.72;0.75" dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="20" y="55" class="line" opacity="0">
    Building BudgetWise-AI
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.80;0.97;1" dur="10s" repeatCount="indefinite"/>
  </text>

  <rect x="480" y="30" width="4" height="30" class="cursor">
    <animate attributeName="opacity" values="1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
